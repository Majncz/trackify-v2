name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "scripts/collect-desktop-bundles.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/desktop-build.yml"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            bundles: app
          - os: windows-latest
            platform: windows
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run desktop tests
        run: npm run desktop:test

      - name: Run desktop Rust lifecycle tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --lib

      - name: Build desktop bundles
        run: |
          node -e "require('fs').rmSync('apps/desktop/src-tauri/target/release/bundle', { recursive: true, force: true })"
          npm run tauri:build --workspace @trackify/desktop -- --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate artifact manifest and checksums
        run: npm run desktop:artifacts
        env:
          TRACKIFY_DESKTOP_PLATFORM: ${{ matrix.platform }}
          TRACKIFY_GIT_SHA: ${{ github.sha }}

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: trackify-desktop-${{ matrix.platform }}-${{ github.sha }}
          path: |
            apps/desktop/src-tauri/target/release/bundle
            artifacts/desktop/${{ matrix.platform }}
          if-no-files-found: error
