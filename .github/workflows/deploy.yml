name: Deploy Trackify

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 195.201.147.39
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PROD_DIR="/root/trackify-prod"
            cd "$PROD_DIR"
            
            # Backup database before deploy
            docker exec trackify-database pg_dump -U trackify trackify > backups/pre_deploy_$(date +%Y%m%d_%H%M%S).sql
            
            # Reset to match remote (prevents dirty working dir from blocking deploys)
            git fetch origin master
            git reset --hard origin/master
            
            # Install dependencies
            npm ci
            
            # Generate Prisma client
            npx prisma generate
            
            # Run database migrations
            npx prisma migrate deploy
            
            # Verify source model and write runtime build metadata
            bash scripts/verify-production.sh source
            bash scripts/write-build-info.sh "$PROD_DIR"

            # Clean and build in prod directory (pm2 trackify-prod runs from here)
            rm -rf .next dist
            npm run build

            # Verify compiled route and reload PM2 from prod checkout
            bash scripts/verify-production.sh compiled
            pm2 startOrReload "$PROD_DIR/ecosystem.config.cjs" --only trackify-prod --update-env
            pm2 save

            # Verify PM2 cwd and live runtime model endpoint
            bash scripts/verify-production.sh pm2
            bash scripts/verify-production.sh runtime

            echo "✅ Deployment complete!"
