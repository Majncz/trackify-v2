name: Deploy Trackify

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 195.201.147.39
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PROD_DIR="/root/trackify-prod"
            cd "$PROD_DIR"
            
            # Backup database before deploy
            docker exec trackify-database pg_dump -U trackify trackify > backups/pre_deploy_$(date +%Y%m%d_%H%M%S).sql
            
            # Reset to match remote (prevents dirty working dir from blocking deploys)
            git fetch origin master
            git reset --hard origin/master
            
            # Install dependencies
            npm ci
            
            # Generate Prisma client
            npx prisma generate
            
            # Run database migrations
            npx prisma migrate deploy
            
            # Verify source model before build
            if ! grep -q 'anthropic("claude-sonnet-5")' src/app/api/chat/route.ts; then
              echo "ERROR: chat route is not on claude-sonnet-5"
              exit 1
            fi

            # Clean and build in prod directory (pm2 trackify-prod runs from here)
            rm -rf .next dist
            npm run build

            # Verify compiled route contains Sonnet 5
            if ! grep -q 'claude-sonnet-5' .next/server/app/api/chat/route.js; then
              echo "ERROR: built chat route missing claude-sonnet-5"
              exit 1
            fi

            # Reload PM2 from ecosystem so cwd/env match repo (.env on disk is preserved)
            pm2 startOrReload ecosystem.config.cjs --only trackify-prod --update-env
            pm2 save

            echo "✅ Deployment complete!"
