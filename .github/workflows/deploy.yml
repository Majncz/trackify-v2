name: Deploy Trackify

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 195.201.147.39
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PROD_DIR="/root/trackify-prod"
            cd "$PROD_DIR"
            
            # Backup database before deploy
            docker exec trackify-database pg_dump -U trackify trackify > backups/pre_deploy_$(date +%Y%m%d_%H%M%S).sql
            
            # Reset to match remote (prevents dirty working dir from blocking deploys)
            git fetch origin master
            git reset --hard origin/master
            
            # Install dependencies
            npm ci
            
            # Generate Prisma client & migrate (pinned CLI — avoids npx fetching Prisma 7+)
            node ./node_modules/prisma/build/index.js generate --schema prisma/schema.prisma
            node ./node_modules/prisma/build/index.js migrate deploy --schema prisma/schema.prisma
            
            # Clean and build in prod directory (pm2 trackify-prod runs from here)
            rm -rf .next dist
            npm run build
            
            # Restart PM2
            pm2 restart trackify-prod
            
            echo "✅ Deployment complete!"
